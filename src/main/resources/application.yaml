server:
  port: 8080

spring:
  profiles:
    active: dev
  application:
    name: spring-boot-essentials
  datasource:
    url: jdbc:mysql://localhost:3306/gym?createDatabaseIfNotExist=true
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true